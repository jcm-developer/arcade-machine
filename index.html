<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON ARCADE — Cabinet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05030c;
    --cab:#16101f;
    --cab2:#0d0a16;
    --neon:#ff2e88;
    --neon2:#22e1ff;
    --gold:#ffd24a;
    --txt:#ffe9f6;
    --dim:#9a86c4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'DM Mono',monospace;color:var(--txt);
    background:
      radial-gradient(1300px 900px at 50% -8%, rgba(255,46,136,.20), transparent 60%),
      radial-gradient(1100px 900px at 50% 115%, rgba(34,225,255,.14), transparent 55%),
      var(--bg);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:8px;overflow-x:hidden;
  }
  /* global scanline overlay */
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:200;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.10) 2px 3px);
    mix-blend-mode:multiply;opacity:.5}

  /* ================= CABINET ================= */
  .cabinet{
    position:relative;width:100%;max-width:1700px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    animation:rise .7s cubic-bezier(.2,.9,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}

  /* the whole machine: side panels + central console, with a close-up perspective */
  .body-row{display:flex;align-items:stretch;justify-content:center;width:100%;
    perspective:2400px;}

  /* ---- side art panels (the cabinet body seen on the left/right) ---- */
  .side{flex:1 1 0;min-width:46px;max-width:36vw;position:relative;
    transform-style:preserve-3d;}
  .side.left {transform-origin:right center; transform:rotateY(26deg);}
  .side.right{transform-origin:left center;  transform:rotateY(-26deg);}
  .side .panel{position:absolute;inset:0;overflow:hidden;
    background:
      linear-gradient(180deg,#1a1230,#0b0816),
      var(--cab);
    border:2px solid rgba(120,90,180,.30);
    box-shadow:inset 0 0 70px rgba(80,40,120,.30), 0 30px 80px -24px rgba(0,0,0,.9);}
  .side.left  .panel{border-radius:18px 6px 6px 18px;border-right:0;}
  .side.right .panel{border-radius:6px 18px 18px 6px;border-left:0;}
  /* glowing edge strip near the screen seam */
  .side .panel::before{content:"";position:absolute;top:6%;bottom:6%;width:10px;
    background:linear-gradient(180deg,var(--neon),var(--neon2));
    box-shadow:0 0 22px var(--neon);border-radius:6px;opacity:.7;filter:blur(.3px);}
  .side.left  .panel::before{right:14px}
  .side.right .panel::before{left:14px}
  /* speaker grille dots near the top */
  .side .panel::after{content:"";position:absolute;top:24px;width:64px;height:120px;
    background-image:radial-gradient(rgba(255,255,255,.16) 1.6px, transparent 2px);
    background-size:13px 13px;opacity:.6;}
  .side.left  .panel::after{left:24px}
  .side.right .panel::after{right:24px}
  /* vertical cabinet title */
  .side .vtitle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(180deg);
    writing-mode:vertical-rl;font-family:'Press Start 2P',monospace;
    font-size:clamp(16px,3.2vh,30px);letter-spacing:4px;white-space:nowrap;
    background:linear-gradient(180deg,var(--neon2),var(--neon));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,46,136,.55));opacity:.92;}
  .side.right .vtitle{transform:translate(-50%,-50%) rotate(0deg);}
  .side .glyph{position:absolute;left:50%;bottom:5%;transform:translateX(-50%);
    font-size:clamp(34px,6vh,64px);filter:drop-shadow(0 0 16px rgba(34,225,255,.4));opacity:.85}

  /* ---- central console (marquee + screen + controls) ---- */
  .console{position:relative;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;
    z-index:3;padding:12px clamp(10px,1.4vw,20px) 14px;
    background:linear-gradient(180deg,var(--cab),var(--cab2));
    border:2px solid rgba(120,90,180,.32);border-radius:14px;
    box-shadow:0 36px 100px -24px rgba(0,0,0,.9), inset 0 0 60px rgba(80,40,120,.2);}

  /* marquee (lit header) */
  .marquee{
    width:100%;text-align:center;padding:12px 10px;border-radius:12px 12px 4px 4px;margin-bottom:10px;
    background:linear-gradient(180deg,#1c1330,#120c1f);
    border:2px solid rgba(255,46,136,.35);
    box-shadow:0 0 30px rgba(255,46,136,.25),inset 0 0 24px rgba(34,225,255,.12);
    position:relative;z-index:3;
  }
  .marquee h1{
    font-family:'Press Start 2P',monospace;font-size:clamp(16px,2.6vw,30px);
    letter-spacing:2px;line-height:1.25;
    background:linear-gradient(180deg,var(--neon2),var(--neon) 90%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,46,136,.55));
    animation:flicker 5s infinite;
  }
  @keyframes flicker{0%,18%,22%,25%,53%,57%,100%{opacity:1}20%,23%,55%{opacity:.72}}
  .marquee .sub{font-family:'Silkscreen',monospace;color:var(--dim);font-size:clamp(8px,1vw,11px);letter-spacing:3px;margin-top:6px}

  /* ---- the SCREEN (4:3 CRT, sized by viewport height — same for every game) ---- */
  .bezel{
    position:relative;margin:0 auto;
    background:#000;border-radius:18px;padding:clamp(10px,1.4vh,20px);
    border:3px solid #2a2440;
    box-shadow:0 0 0 6px #08060f,0 0 70px rgba(34,225,255,.14),inset 0 0 30px rgba(0,0,0,.9);
  }
  .screen{
    position:relative;width:min(90vw,86vh,1080px);aspect-ratio:4/3;
    background:#04020a;border-radius:10px;
    overflow:hidden;box-shadow:inset 0 0 60px rgba(0,0,0,.85);
  }
  .screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:50;
    background:
      radial-gradient(120% 120% at 50% 45%,transparent 60%,rgba(0,0,0,.55) 100%),
      repeating-linear-gradient(to bottom,rgba(255,255,255,.03) 0 1px,rgba(0,0,0,.10) 1px 3px);
    border-radius:10px;}

  /* the game iframe fills the screen */
  #gameFrame{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000;display:none;z-index:5}
  #exitBtn{position:absolute;top:8px;right:8px;z-index:60;font-family:'Silkscreen',monospace;
    font-size:11px;letter-spacing:1px;color:var(--txt);background:rgba(10,7,18,.78);
    border:1px solid rgba(255,46,136,.5);border-radius:8px;padding:7px 11px;cursor:pointer;
    box-shadow:0 0 14px rgba(255,46,136,.35);opacity:.55;transition:opacity .15s,transform .12s}
  #exitBtn:hover{opacity:1;transform:scale(1.05);border-color:#fff}

  /* ============ MENU layer ============ */
  .layer{position:absolute;inset:0;display:flex;flex-direction:column;z-index:10}
  .hidden{display:none!important}

  /* SELECT screen */
  #selectScreen{align-items:center;justify-content:center;padding:5% 6%;text-align:center}
  .select-head{font-family:'Press Start 2P',monospace;font-size:clamp(9px,2vw,13px);
    color:var(--gold);letter-spacing:2px;text-shadow:0 0 10px rgba(255,210,74,.6);
    animation:blink 1.3s steps(2) infinite}
  @keyframes blink{50%{opacity:.35}}

  .carousel{display:flex;align-items:center;justify-content:center;gap:clamp(8px,3vw,22px);
    margin:auto 0;width:100%}
  .arrow{font-family:'Press Start 2P',monospace;font-size:clamp(14px,3vw,22px);
    color:var(--neon2);background:none;border:0;cursor:pointer;padding:10px;
    text-shadow:0 0 12px rgba(34,225,255,.7);transition:transform .12s,color .12s}
  .arrow:hover{transform:scale(1.25);color:#fff}
  .arrow:active{transform:scale(.9)}

  .cart{flex:1;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .cart-art{width:clamp(120px,40vw,180px);aspect-ratio:1;border-radius:18px;
    display:flex;align-items:center;justify-content:center;font-size:clamp(48px,16vw,76px);
    position:relative;border:2px solid rgba(255,255,255,.15);
    box-shadow:0 0 40px var(--glow,rgba(255,46,136,.5)),inset 0 0 30px rgba(0,0,0,.4);
    animation:hover 3s ease-in-out infinite}
  @keyframes hover{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .cart-title{font-family:'Press Start 2P',monospace;font-size:clamp(12px,3vw,20px);
    letter-spacing:1px;color:#fff;text-shadow:0 0 14px var(--glow,rgba(255,46,136,.7))}
  .cart-tag{font-family:'Silkscreen',monospace;color:var(--dim);font-size:clamp(8px,1.6vw,11px);letter-spacing:2px}
  .dots{display:flex;gap:8px;margin-bottom:6px}
  .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.18);transition:.2s}
  .dot.on{background:var(--neon);box-shadow:0 0 10px var(--neon);transform:scale(1.3)}

  .start-btn{font-family:'Press Start 2P',monospace;font-size:clamp(9px,1.8vw,12px);
    padding:12px 22px;border-radius:10px;cursor:pointer;color:#0a0712;
    background:linear-gradient(180deg,var(--gold),#ffae00);border:0;letter-spacing:2px;
    box-shadow:0 0 24px rgba(255,210,74,.55);transition:transform .12s}
  .start-btn:hover{transform:translateY(-2px) scale(1.03)}
  .start-btn:active{transform:translateY(1px)}

  /* INSTRUCTIONS screen */
  #howScreen{padding:6% 8%;justify-content:center;gap:14px;
    background:radial-gradient(120% 120% at 50% 0%,rgba(34,225,255,.10),transparent 55%)}
  #howScreen .ic{font-size:clamp(34px,10vw,54px);text-align:center;filter:drop-shadow(0 0 16px var(--glow))}
  #howTitle{font-family:'Press Start 2P',monospace;font-size:clamp(12px,3vw,20px);text-align:center;
    color:#fff;text-shadow:0 0 14px var(--glow)}
  #howDesc{text-align:center;color:var(--dim);font-size:clamp(10px,1.8vw,13px);line-height:1.6;max-width:440px;margin:0 auto}
  .keys{display:flex;flex-direction:column;gap:8px;max-width:380px;margin:6px auto 0;width:100%}
  .krow{display:flex;justify-content:space-between;align-items:center;gap:12px;
    background:rgba(20,16,40,.6);border:1px solid rgba(120,110,200,.2);border-radius:8px;padding:9px 13px}
  .krow span{color:var(--dim);font-size:clamp(9px,1.6vw,12px)}
  .krow b{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.4vw,11px);color:var(--neon2);
    text-shadow:0 0 8px rgba(34,225,255,.5)}
  .how-actions{display:flex;gap:12px;justify-content:center;margin-top:8px;flex-wrap:wrap}
  .ghost-btn{font-family:'Silkscreen',monospace;font-size:clamp(9px,1.6vw,12px);letter-spacing:2px;
    padding:11px 18px;border-radius:9px;cursor:pointer;color:var(--txt);
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.2);transition:.15s}
  .ghost-btn:hover{background:rgba(255,255,255,.12);border-color:#fff}

  /* ============ control deck ============ */
  .deck{width:100%;margin-top:12px;padding:clamp(10px,1.6vh,20px) clamp(16px,3vw,40px);
    background:linear-gradient(180deg,#181024,#0c0814);border-radius:14px;
    border:2px solid rgba(120,90,180,.22);box-shadow:inset 0 6px 20px rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .joystick{width:54px;height:54px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 38% 32%,#3a2a55,#120b1e);
    border:3px solid #2a1f44;position:relative;box-shadow:0 8px 18px rgba(0,0,0,.6)}
  .joystick::before{content:"";position:absolute;left:50%;top:-26px;transform:translateX(-50%);
    width:12px;height:34px;background:linear-gradient(#5a4a7a,#2a1f44);border-radius:6px}
  .joystick::after{content:"";position:absolute;left:50%;top:-44px;transform:translateX(-50%);
    width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 38% 32%,var(--neon),#9c0d4a);
    box-shadow:0 0 18px var(--neon)}
  .btn-cluster{display:flex;gap:14px;flex:0 0 auto}
  .ab{width:38px;height:38px;border-radius:50%;border:3px solid rgba(0,0,0,.4)}
  .ab.r{background:radial-gradient(circle at 36% 30%,#ff6aa0,#c01054);box-shadow:0 0 16px rgba(255,46,136,.6)}
  .ab.c{background:radial-gradient(circle at 36% 30%,#6af0ff,#0a8fb5);box-shadow:0 0 16px rgba(34,225,255,.6)}
  .ab.y{background:radial-gradient(circle at 36% 30%,#ffe07a,#d99a00);box-shadow:0 0 16px rgba(255,210,74,.6)}
  .coin{font-family:'Silkscreen',monospace;color:var(--dim);font-size:11px;letter-spacing:2px;text-align:center;flex:1 1 auto;min-width:120px}
  .coin .slot{width:60px;height:8px;background:#000;border-radius:4px;margin:6px auto;box-shadow:inset 0 0 6px rgba(255,210,74,.5)}

  .footer{color:var(--dim);font-family:'Silkscreen',monospace;font-size:10px;letter-spacing:2px;text-align:center}
  .footer a{color:var(--neon2);text-decoration:none}

  /* on narrow screens, drop the angle and let side panels shrink away */
  @media (max-width:760px){
    .side{max-width:0;min-width:0;flex:0 0 0;border:0}
    .side .panel{display:none}
    .console{flex:1 1 auto;width:100%}
    .deck{justify-content:center}
  }
</style>
</head>
<body>
  <div class="cabinet">
    <div class="body-row">

      <!-- LEFT cabinet side art -->
      <div class="side left" aria-hidden="true">
        <div class="panel">
          <div class="vtitle">NEON ARCADE</div>
          <div class="glyph">👾</div>
        </div>
      </div>

      <!-- CENTRAL console -->
      <div class="console">
        <div class="marquee">
          <h1>NEON ARCADE</h1>
          <div class="sub">★ INSERT COIN · 4 GAMES · 1 CABINET ★</div>
        </div>

        <div class="bezel">
          <div class="screen">
          <!-- the actual game -->
          <iframe id="gameFrame" title="game" allow="autoplay" allowfullscreen></iframe>
          <button id="exitBtn" class="hidden" aria-label="salir al menú">✕ MENÚ</button>

          <!-- SELECT layer -->
          <div class="layer" id="selectScreen">
            <div class="select-head">▶ SELECT GAME ◀</div>
            <div class="carousel">
              <button class="arrow" id="prevBtn" aria-label="anterior">◄</button>
              <div class="cart">
                <div class="cart-art" id="cartArt">🎮</div>
                <div class="cart-title" id="cartTitle">—</div>
                <div class="cart-tag" id="cartTag">—</div>
              </div>
              <button class="arrow" id="nextBtn" aria-label="siguiente">►</button>
            </div>
            <div class="dots" id="dots"></div>
            <button class="start-btn" id="chooseBtn">CONTINUAR ▸</button>
          </div>

          <!-- INSTRUCTIONS layer -->
          <div class="layer hidden" id="howScreen">
            <div class="ic" id="howIcon">🎮</div>
            <div id="howTitle">—</div>
            <div id="howDesc">—</div>
            <div class="keys" id="howKeys"></div>
            <div class="how-actions">
              <button class="ghost-btn" id="backBtn">◂ VOLVER</button>
              <button class="start-btn" id="playBtn">▶ JUGAR</button>
            </div>
          </div>
        </div>
      </div>

        <div class="deck">
          <div class="joystick" aria-hidden="true"></div>
          <div class="coin">
            INSERT COIN
            <div class="slot"></div>
            PLAYER 1 READY
          </div>
          <div class="btn-cluster" aria-hidden="true">
            <div class="ab r"></div><div class="ab y"></div><div class="ab c"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT cabinet side art -->
      <div class="side right" aria-hidden="true">
        <div class="panel">
          <div class="vtitle">NEON ARCADE</div>
          <div class="glyph">🕹️</div>
        </div>
      </div>

    </div>

    <div class="footer">USA ◄ ► PARA ELEGIR · ENTER PARA CONFIRMAR · ESC PARA SALIR DEL JUEGO</div>
  </div>

<script>
  const GAMES = [
    {
      file:"pacman.html", title:"NEON CHOMP", tag:"MAZE · CHASE", icon:"🟡",
      glow:"rgba(255,225,26,.7)",
      desc:"Come todos los puntos del laberinto sin que te atrapen los fantasmas. Los power-pellets te dejan cazarlos.",
      keys:[["Mover","← → ↑ ↓ / WASD"],["Cazar fantasmas","Come un POWER"],["Pausa","P"],["Empezar","ENTER"]]
    },
    {
      file:"tetris.html", title:"NEON TETRIS", tag:"PUZZLE · BLOCKS", icon:"🧱",
      glow:"rgba(34,225,255,.7)",
      desc:"Encaja las piezas que caen y completa líneas horizontales para eliminarlas. ¡No dejes que la pila llegue arriba!",
      keys:[["Mover","← →"],["Rotar","↑ / X"],["Bajar","↓"],["Soltar","ESPACIO"],["Guardar","C / SHIFT"],["Pausa","P"]]
    },
    {
      file:"donkey-kong.html", title:"BARREL CLIMB", tag:"PLATFORM · CLIMB", icon:"🦍",
      glow:"rgba(255,90,77,.7)",
      desc:"Trepa por las plataformas esquivando barriles hasta llegar a lo más alto. Salta en el momento justo.",
      keys:[["Mover","← →"],["Trepar","↑ ↓"],["Saltar","ESPACIO / Z"],["Pausa","P"]]
    },
    {
      file:"f1.html", title:"APEX GP", tag:"RACING · F1", icon:"🏎️",
      glow:"rgba(255,176,0,.75)",
      desc:"Pilota tu monoplaza pixelado, traza las curvas y adelanta a los rivales. Usa el boost en las rectas.",
      keys:[["Girar","← → / A D"],["Acelerar","↑ / W"],["Frenar","↓ / S"],["Boost","SHIFT"],["Pausa","P"],["Reiniciar","R"]]
    }
  ];

  let idx = 0;            // current selection
  let view = "select";    // select | how | play

  const $ = s => document.querySelector(s);
  const frame   = $("#gameFrame");
  const selectS = $("#selectScreen");
  const howS    = $("#howScreen");
  const exitBtn = $("#exitBtn");

  // build dots
  const dotsEl = $("#dots");
  GAMES.forEach(()=>{ const d=document.createElement("div"); d.className="dot"; dotsEl.appendChild(d); });

  function renderSelect(){
    const g = GAMES[idx];
    $("#cartArt").textContent = g.icon;
    $("#cartArt").style.background = `radial-gradient(circle at 38% 30%, ${g.glow}, rgba(10,7,18,.9))`;
    $("#cartArt").style.setProperty("--glow", g.glow);
    $("#cartTitle").textContent = g.title;
    $("#cartTitle").style.setProperty("--glow", g.glow);
    $("#cartTag").textContent = g.tag;
    [...dotsEl.children].forEach((d,i)=>d.classList.toggle("on", i===idx));
  }

  function renderHow(){
    const g = GAMES[idx];
    howS.style.setProperty("--glow", g.glow);
    $("#howIcon").textContent = g.icon;
    $("#howTitle").textContent = g.title;
    $("#howTitle").style.setProperty("--glow", g.glow);
    $("#howDesc").textContent = g.desc;
    const k = $("#howKeys"); k.innerHTML = "";
    g.keys.forEach(([label,key])=>{
      const row=document.createElement("div"); row.className="krow";
      row.innerHTML = `<span>${label}</span><b>${key}</b>`;
      k.appendChild(row);
    });
  }

  function show(v){
    view = v;
    selectS.classList.toggle("hidden", v!=="select");
    howS.classList.toggle("hidden", v!=="how");
    exitBtn.classList.add("hidden");
    if(v==="select"){ frame.style.display="none"; frame.src="about:blank"; }
  }

  function move(dir){
    idx = (idx + dir + GAMES.length) % GAMES.length;
    renderSelect();
  }

  function play(){
    const g = GAMES[idx];
    view = "play";
    selectS.classList.add("hidden");
    howS.classList.add("hidden");
    exitBtn.classList.remove("hidden");
    frame.style.display = "block";
    frame.src = g.file;
    frame.addEventListener("load", ()=>{
      try{
        frame.contentWindow.focus();
        // same-origin: catch ESC from inside the game to return to the menu
        frame.contentWindow.addEventListener("keydown", ev=>{
          if(ev.key==="Escape"){ show("select"); }
        }, true);
      }catch(e){}
    }, {once:true});
  }

  // ---- buttons ----
  $("#prevBtn").onclick = ()=>move(-1);
  $("#nextBtn").onclick = ()=>move(1);
  $("#chooseBtn").onclick = ()=>{ renderHow(); show("how"); };
  $("#backBtn").onclick  = ()=>show("select");
  $("#playBtn").onclick  = play;
  $("#cartArt").onclick  = ()=>{ renderHow(); show("how"); };
  exitBtn.onclick = ()=>show("select");

  // ---- keyboard (only when not inside a running game) ----
  window.addEventListener("keydown", e=>{
    if(view==="play"){
      if(e.key==="Escape") show("select");
      return;
    }
    if(view==="select"){
      if(e.key==="ArrowLeft")  { move(-1); e.preventDefault(); }
      if(e.key==="ArrowRight") { move(1);  e.preventDefault(); }
      if(e.key==="Enter")      { renderHow(); show("how"); e.preventDefault(); }
    } else if(view==="how"){
      if(e.key==="Enter")  { play(); e.preventDefault(); }
      if(e.key==="Escape" || e.key==="Backspace") { show("select"); e.preventDefault(); }
    }
  });

  // ESC from inside the iframe sends a message? Games may capture ESC themselves.
  // Fallback: clicking the marquee returns to menu.
  $(".marquee").addEventListener("dblclick", ()=>{ if(view==="play") show("select"); });

  renderSelect();
</script>
</body>
</html>
