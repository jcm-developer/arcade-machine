<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON FROGGER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07060f;
    --panel:rgba(18,15,38,.55);
    --line:rgba(120,110,200,.18);
    --txt:#d7d2ff;
    --dim:#7b75b8;
    --cyan:#22e1ff;
    --pink:#ff3ca6;
    --gold:#ffd24a;
    --accent:#a98bff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'DM Mono',monospace;
    background:
      radial-gradient(1200px 700px at 50% -10%, rgba(80,50,150,.35), transparent 60%),
      radial-gradient(900px 600px at 100% 110%, rgba(255,60,166,.12), transparent 55%),
      var(--bg);
    color:var(--txt);
    min-height:100%;
    display:flex;align-items:center;justify-content:center;
    padding:18px;overflow:hidden;position:relative;
  }
  /* scanlines */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.18) 2px 3px);
    mix-blend-mode:multiply;opacity:.5;
  }
  .stage{
    display:flex;flex-direction:column;align-items:center;gap:14px;
    animation:rise .7s cubic-bezier(.2,.9,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

  .brand{text-align:center;line-height:1}
  .brand h1{
    font-family:'Silkscreen',monospace;font-weight:700;
    font-size:26px;letter-spacing:3px;
    background:linear-gradient(180deg,var(--cyan),var(--accent) 70%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 14px rgba(120,80,255,.55));
  }
  .brand p{font-size:10.5px;color:var(--dim);letter-spacing:3px;margin-top:6px}

  .hud{
    display:flex;gap:22px;align-items:center;justify-content:center;
    font-size:11px;color:var(--dim);
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:8px 18px;backdrop-filter:blur(6px);
  }
  .hud .v{font-family:'Silkscreen',monospace;font-size:15px;color:var(--txt);text-shadow:0 0 12px rgba(120,90,255,.5);margin-left:8px}
  .hud .v.gold{color:var(--gold);text-shadow:0 0 14px rgba(255,210,74,.5)}
  .hud .lives{color:var(--pink);letter-spacing:2px;font-size:15px;margin-left:8px}

  .board-wrap{position:relative}
  canvas#board{
    display:block;
    background:rgba(8,6,20,.7);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:0 0 0 1px rgba(0,0,0,.6), 0 30px 80px -20px rgba(120,60,255,.45), inset 0 0 60px rgba(80,40,160,.25);
  }

  .keys{
    font-size:10.5px;color:var(--dim);line-height:1.9;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 16px;backdrop-filter:blur(6px);display:flex;gap:22px;flex-wrap:wrap;justify-content:center;
  }
  .keys b{color:var(--accent);font-weight:500}

  /* overlay */
  .overlay{
    position:absolute;inset:0;border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:radial-gradient(circle at 50% 40%,rgba(20,12,45,.82),rgba(7,6,15,.96));
    backdrop-filter:blur(3px);z-index:10;text-align:center;padding:20px;
  }
  .overlay.hidden{display:none}
  .overlay h2{font-family:'Silkscreen',monospace;font-size:22px;letter-spacing:1px;
    background:linear-gradient(180deg,var(--cyan),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,60,166,.4))}
  .overlay p{font-size:11.5px;color:var(--dim);max-width:260px;line-height:1.7}
  .btn{
    font-family:'Silkscreen',monospace;font-size:12px;letter-spacing:1px;cursor:pointer;
    color:#0a0815;background:linear-gradient(180deg,var(--cyan),var(--accent));
    border:none;border-radius:8px;padding:12px 22px;
    box-shadow:0 0 24px rgba(120,90,255,.55);transition:transform .12s,box-shadow .12s;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(120,90,255,.8)}
  .btn:active{transform:translateY(0)}

  @media (max-width:760px){
    body{align-items:flex-start;overflow-y:auto}
    .keys{display:none}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="brand">
      <h1>NEON FROGGER</h1>
      <p>ARCADE · 2026</p>
    </div>

    <div class="hud">
      <span>PUNTOS<span class="v gold" id="score">0</span></span>
      <span>RÉCORD<span class="v" id="best">0</span></span>
      <span>VIDAS<span class="lives" id="lives">♥♥♥</span></span>
    </div>

    <div class="board-wrap">
      <canvas id="board" width="600" height="600"></canvas>
      <div id="overlay" class="overlay">
        <h2 id="ovTitle">NEON FROGGER</h2>
        <p id="ovText">Cruza la carretera esquivando el tráfico hasta la zona segura de arriba. Usa las flechas para saltar casilla a casilla.</p>
        <button class="btn" id="startBtn">JUGAR</button>
      </div>
    </div>

    <div class="keys">
      <span>Mover <b>← → ↑ ↓</b></span>
      <span>Pausa <b>P</b></span>
    </div>
  </div>

<script>
(() => {
  const W = 600, H = 600;
  const COLS = 12, ROWS = 12, CELL = 50; // 600/50 = 12
  const board = document.getElementById('board');
  const ctx = board.getContext('2d');

  const VCOLORS = ['#ff3ca6', '#22e1ff', '#ffd24a'];
  const FROG = '#3ee68a';

  // Rows layout (top -> bottom):
  // row 0  : zona segura (meta)
  // rows 1-5 : carriles de tráfico
  // row 6  : mediana segura
  // rows 7-10 : carriles de tráfico
  // row 11 : zona de inicio segura
  const TRAFFIC_ROWS = [1, 2, 3, 4, 5, 7, 8, 9, 10];

  let frog, lanes, score, best, lives, level;
  let running = false, paused = false, over = false;
  let last = 0;

  best = +(localStorage.getItem('neon_frogger_best') || 0);
  document.getElementById('best').textContent = best;

  function buildLanes(){
    lanes = [];
    for(const r of TRAFFIC_ROWS){
      const dir = (r % 2 === 0) ? 1 : -1; // alterna direcciones
      // velocidad base en px/s, aumenta con el nivel
      const baseSpeed = 60 + Math.random() * 70 + level * 14;
      const speed = baseSpeed * dir;
      const big = Math.random() < 0.35;          // camión o coche
      const len = big ? CELL * 2 : CELL * 1.15;
      const color = VCOLORS[(r) % VCOLORS.length];
      const count = big ? 2 : 3;
      const gap = W / count;
      const cars = [];
      for(let i = 0; i < count; i++){
        cars.push({ x: i * gap + Math.random() * 40, len });
      }
      lanes.push({ row: r, speed, color, cars });
    }
  }

  function resetFrog(){
    frog = { col: (COLS / 2) | 0, row: ROWS - 1 };
  }

  function reset(){
    score = 0; lives = 3; level = 1; over = false; paused = false;
    buildLanes();
    resetFrog();
    updateHUD();
  }

  function updateHUD(){
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = '♥'.repeat(Math.max(0, lives)) || '–';
    if(score > best){
      best = score;
      localStorage.setItem('neon_frogger_best', best);
      document.getElementById('best').textContent = best;
    }
  }

  function start(){
    reset();
    document.getElementById('overlay').classList.add('hidden');
    running = true; last = 0;
    requestAnimationFrame(loop);
  }

  function showOverlay(title, text, btn){
    const o = document.getElementById('overlay');
    document.getElementById('ovTitle').textContent = title;
    document.getElementById('ovText').textContent = text;
    document.getElementById('startBtn').textContent = btn;
    o.classList.remove('hidden');
  }

  function gameOver(){
    over = true; running = false;
    showOverlay('GAME OVER', 'Puntos: ' + score + '  ·  Récord: ' + best, 'REINTENTAR');
  }

  function loseLife(){
    lives--;
    updateHUD();
    if(lives <= 0){ gameOver(); return; }
    resetFrog();
  }

  function reachGoal(){
    score += 100 + level * 10;
    level++;
    buildLanes(); // sube dificultad: nuevos carriles más rápidos
    resetFrog();
    updateHUD();
  }

  function move(dCol, dRow){
    if(!running || paused || over) return;
    const nc = frog.col + dCol;
    const nr = frog.row + dRow;
    if(nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) return;
    frog.col = nc; frog.row = nr;
    if(frog.row === 0){ reachGoal(); }
  }

  function update(dt){
    // mover vehículos
    for(const lane of lanes){
      for(const car of lane.cars){
        car.x += lane.speed * dt;
        if(lane.speed > 0 && car.x > W){ car.x = -car.len; }
        else if(lane.speed < 0 && car.x + car.len < 0){ car.x = W; }
      }
    }
    // colisión con la rana
    const fx = frog.col * CELL;
    const fy = frog.row * CELL;
    const pad = 6;
    for(const lane of lanes){
      if(lane.row !== frog.row) continue;
      for(const car of lane.cars){
        if(fx + CELL - pad > car.x && fx + pad < car.x + car.len){
          loseLife();
          return;
        }
      }
    }
  }

  // ---- rendering ----
  function isSafeRow(r){ return r === 0 || r === 6 || r === ROWS - 1; }

  function draw(){
    ctx.clearRect(0, 0, W, H);

    // filas: carretera oscura, zonas seguras en tono neón
    for(let r = 0; r < ROWS; r++){
      const y = r * CELL;
      if(r === 0){
        // meta
        ctx.fillStyle = 'rgba(62,230,138,.10)';
        ctx.fillRect(0, y, W, CELL);
      } else if(r === 6){
        // mediana
        ctx.fillStyle = 'rgba(169,139,255,.10)';
        ctx.fillRect(0, y, W, CELL);
      } else if(r === ROWS - 1){
        // inicio
        ctx.fillStyle = 'rgba(34,225,255,.08)';
        ctx.fillRect(0, y, W, CELL);
      } else {
        // carretera
        ctx.fillStyle = 'rgba(10,8,22,.85)';
        ctx.fillRect(0, y, W, CELL);
        // líneas de carril discontinuas
        ctx.save();
        ctx.strokeStyle = 'rgba(255,210,74,.22)';
        ctx.lineWidth = 2;
        ctx.setLineDash([18, 16]);
        ctx.beginPath();
        ctx.moveTo(0, y + CELL);
        ctx.lineTo(W, y + CELL);
        ctx.stroke();
        ctx.restore();
      }
    }

    // borde de zona meta
    ctx.save();
    ctx.strokeStyle = 'rgba(62,230,138,.45)';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, W - 2, CELL);
    ctx.fillStyle = 'rgba(62,230,138,.5)';
    ctx.font = "12px 'Silkscreen', monospace";
    ctx.textAlign = 'center';
    ctx.fillText('META', W / 2, CELL / 2 + 4);
    ctx.restore();

    // vehículos
    for(const lane of lanes){
      const y = lane.row * CELL;
      for(const car of lane.cars){
        glowRoundRect(car.x + 3, y + 8, car.len - 6, CELL - 16, lane.color);
        // ventanilla
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,.20)';
        const wx = lane.speed > 0 ? car.x + car.len - 18 : car.x + 6;
        ctx.fillRect(wx, y + 14, 12, CELL - 28);
        ctx.restore();
      }
    }

    // rana
    drawFrog();
  }

  function glowRoundRect(x, y, w, h, color){
    const r = 8;
    ctx.save();
    ctx.shadowColor = color; ctx.shadowBlur = 16;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawFrog(){
    const cx = frog.col * CELL + CELL / 2;
    const cy = frog.row * CELL + CELL / 2;
    const r = CELL * 0.32;
    ctx.save();
    ctx.shadowColor = FROG; ctx.shadowBlur = 22;
    ctx.fillStyle = FROG;
    // cuerpo
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    // patas
    ctx.fillRect(cx - r - 4, cy - r + 2, 8, 8);
    ctx.fillRect(cx + r - 4, cy - r + 2, 8, 8);
    ctx.fillRect(cx - r - 4, cy + r - 10, 8, 8);
    ctx.fillRect(cx + r - 4, cy + r - 10, 8, 8);
    ctx.restore();
    // ojos
    ctx.save();
    ctx.fillStyle = '#07060f';
    ctx.beginPath();
    ctx.arc(cx - 6, cy - 5, 3, 0, Math.PI * 2);
    ctx.arc(cx + 6, cy - 5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function loop(t){
    if(!running) return;
    if(!last) last = t;
    let dt = (t - last) / 1000;
    last = t;
    if(dt > 0.05) dt = 0.05; // clamp
    if(!paused && !over) update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function togglePause(){
    if(over || !running) return;
    paused = !paused;
    if(paused){
      showOverlay('PAUSA', 'El tráfico te espera. Respira.', 'CONTINUAR');
    } else {
      document.getElementById('overlay').classList.add('hidden');
      last = performance.now();
    }
  }

  // ---- input ----
  document.addEventListener('keydown', e => {
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
    if(e.key === 'p' || e.key === 'P'){ togglePause(); return; }
    if(!running || paused || over) return;
    switch(e.key){
      case 'ArrowLeft':  move(-1, 0); break;
      case 'ArrowRight': move(1, 0); break;
      case 'ArrowUp':    move(0, -1); break;
      case 'ArrowDown':  move(0, 1); break;
    }
    draw();
  });

  document.getElementById('startBtn').addEventListener('click', () => {
    if(paused && running){ togglePause(); } else { start(); }
  });

  // initial paint
  level = 1;
  buildLanes();
  resetFrog();
  score = 0; lives = 3;
  draw();
})();
</script>
</body>
</html>
